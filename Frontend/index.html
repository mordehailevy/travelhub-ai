<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;700;800&family=Nunito+Sans:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>TravelHub AI</title>
    <meta
      name="description"
      content="Browse and book vacations, like your favorite destinations, and get AI-powered trip recommendations with TravelHub AI."
    />
    <meta property="og:title" content="TravelHub AI" />
    <meta
      property="og:description"
      content="Browse and book vacations, like your favorite destinations, and get AI-powered trip recommendations with TravelHub AI."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/mordehai-logo.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <script>
      (function () {
        var stored = localStorage.getItem("travelhub_theme");
        var dark = stored ? stored === "dark" : window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.classList.toggle("dark", dark);
        document.documentElement.style.colorScheme = dark ? "dark" : "light";
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
